<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMX Toolbox — Scene</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface: #1a1a1a;
            --card-bg: #242424;
            --primary: #007bff;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --text-dim: #999;
            --success: #218838;
            --danger: #c82333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: #000;
            padding: 16px 20px;
            border-bottom: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        .page-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* PIN Screen */
        #pin-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 24px;
        }

        .pin-title {
            font-size: 1rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .pin-display {
            display: flex;
            gap: 12px;
        }

        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #444;
            background: transparent;
            transition: 0.2s;
        }

        .pin-dot.filled {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pin-error {
            color: var(--danger);
            font-size: 0.85rem;
            height: 20px;
            transition: 0.2s;
        }

        /* Tastierino PIN */
        .pin-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 260px;
            width: 100%;
        }

        .pin-btn {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            color: var(--text);
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pin-btn:active { background: var(--primary); transform: scale(0.95); }
        .pin-btn.empty  { background: transparent; border: none; cursor: default; }
        .pin-btn.del    { color: var(--danger); font-size: 1.2rem; }

        /* Scene Screen */
        #scene-screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Griglia scene */
        .scenes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex: 1;
        }

        .scene-btn {
            padding: 20px 12px;
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 14px;
            color: var(--text);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 80px;
            word-break: break-word;
        }
        .scene-btn:active  { transform: scale(0.97); }
        .scene-btn.active-scene {
            border-color: var(--accent);
            background: rgba(0,212,255,0.1);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(0,212,255,0.15);
        }

        /* Pulsante release */
        #release-btn {
            width: 100%;
            padding: 18px;
            background: rgba(200,35,51,0.15);
            border: 2px solid var(--danger);
            border-radius: 12px;
            color: var(--danger);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
        }
        #release-btn:active { background: var(--danger); color: #fff; transform: scale(0.98); }

        /* Empty state */
        .empty-scenes {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            padding: 40px 20px;
        }

        /* Responsive */
        @media (min-width: 480px) {
            .scenes-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 768px) {
            .scenes-grid { grid-template-columns: repeat(4, 1fr); }
            .scene-btn   { font-size: 1.1rem; min-height: 100px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h10"/>
        </svg>
        <span>DMX<span style="color:var(--text); font-weight:300;">TOOLBOX</span></span>
    </div>
    <div class="page-title">SCENE</div>
</header>

<!-- Schermata PIN -->
<div id="pin-screen">
    <div class="pin-title">Inserisci PIN</div>

    <div class="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
    </div>

    <div class="pin-error" id="pin-error"></div>

    <div class="pin-keypad">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
</div>

<!-- Schermata Scene -->
<div id="scene-screen">
    <div class="scenes-grid" id="scenes-grid">
        <div class="empty-scenes">Caricamento scene...</div>
    </div>
    <button id="release-btn" onclick="releaseScene()">⬛ RELEASE SCENE</button>
</div>

<script>
// ============================================================
// PIN
// ============================================================
let pinInput = '';
let activeSceneId = -1;
let snapNames = [];

function pinPress(digit) {
    if (pinInput.length >= 4) return;
    pinInput += digit;
    updatePinDots();
    if (pinInput.length === 4) verifyPin();
}

function pinDel() {
    pinInput = pinInput.slice(0, -1);
    updatePinDots();
    document.getElementById('pin-error').innerText = '';
}

function updatePinDots() {
    for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.classList.toggle('filled', i < pinInput.length);
    }
}

function verifyPin() {
    fetch('/get_setup')
        .then(r => r.text())
        .then(data => {
            const p = data.split('|');
            const correctPin = (p[8] || '0000').padStart(4, '0');
            if (pinInput === correctPin) {
                showSceneScreen();
            } else {
                document.getElementById('pin-error').innerText = 'PIN non corretto';
                pinInput = '';
                updatePinDots();
            }
        })
        .catch(() => {
            // In caso di errore di rete, blocca
            document.getElementById('pin-error').innerText = 'Errore di connessione';
            pinInput = '';
            updatePinDots();
        });
}

// ============================================================
// SCENE SCREEN
// ============================================================
function showSceneScreen() {
    document.getElementById('pin-screen').style.display = 'none';
    const ss = document.getElementById('scene-screen');
    ss.style.display = 'flex';
    loadScenes();
    setInterval(pollStatus, 3000);
}

function loadScenes() {
    fetch('/status')
        .then(r => r.text())
        .then(data => {
            const p = data.split('|');
            snapNames = p[12] ? p[12].split(',') : [];
            const sceneActive = p[14] === '1';
            const blackoutActive = p[15] === '1';
            renderScenes();
            updateReleaseBtn(sceneActive || blackoutActive);
        });
}

function renderScenes() {
    const grid = document.getElementById('scenes-grid');
    grid.innerHTML = '';

    const validSnaps = snapNames
        .map((name, idx) => ({ name: name.trim(), idx }))
        .filter(s => s.name !== '' && s.name !== ',');

    if (validSnaps.length === 0) {
        grid.innerHTML = '<div class="empty-scenes">Nessuna scena disponibile</div>';
        return;
    }

    validSnaps.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'scene-btn' + (s.idx === activeSceneId ? ' active-scene' : '');
        btn.innerText = s.name;
        btn.onclick = () => recallSnap(s.idx);
        grid.appendChild(btn);
    });
}

function recallSnap(id) {
    fetch('/run_snap?id=' + id)
        .then(r => r.text())
        .then(res => {
            if (res === 'OK') {
                activeSceneId = id;
                renderScenes();
                updateReleaseBtn(true);
            }
        });
}

function releaseScene() {
    fetch('/release_snap')
        .then(() => {
            activeSceneId = -1;
            renderScenes();
            updateReleaseBtn(false);
        });
}

function updateReleaseBtn(show) {
    document.getElementById('release-btn').style.display = show ? 'block' : 'none';
}

function pollStatus() {
    fetch('/status')
        .then(r => r.text())
        .then(data => {
            const p = data.split('|');
            const newSnaps = p[12] ? p[12].split(',') : [];
            const sceneActive  = p[14] === '1';
            const blackoutActive = p[15] === '1';

            // Aggiorna nomi se cambiati
            if (JSON.stringify(newSnaps) !== JSON.stringify(snapNames)) {
                snapNames = newSnaps;
                renderScenes();
            }

            // Se scena non più attiva, resetta highlight
            if (!sceneActive && !blackoutActive) {
                activeSceneId = -1;
                renderScenes();
            }

            updateReleaseBtn(sceneActive || blackoutActive);
        })
        .catch(() => {});
}
</script>
</body>
</html>
